# EEG Speech Decoding Pipeline Configuration

# 데이터 설정
data:
  n_channels: 64
  sampling_rate: 512
  epoch_length: 1.0  # 초

# 전처리
preprocessor:
  sampling_rate: 512
  bandpass: [0.5, 50]
  notch: 60
  normalize: zscore

# 인코더
encoders:
  wavelet:
    wavelet: db4
    level: 5
    features:
      - mean
      - std
      - rms
      - energy
      - entropy

  riemannian:
    metric: riemann
    n_iter: 50

# 결합기
combiner:
  target_wav_ratio: 0.5  # 균형 (음소 + 의도)
  # 0.3: 의도 중심 (Riemannian 우선)
  # 0.5: 균형
  # 0.7: 음소 중심 (Wavelet 우선)

# 벡터 DB
vector_db:
  index_type: flat  # flat, ivf, hnsw
  metric: cosine

# LLM
llm:
  model: gpt-4
  temperature: 0.7
  max_tokens: 100

# 추론
inference:
  top_k: 5
  min_similarity: 0.3
